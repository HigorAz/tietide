name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tietide/api db:generate

      - name: Lint
        run: pnpm -r --if-present run lint

      - name: Typecheck
        run: pnpm run typecheck

  test:
    name: Test (Node) with coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tietide
          POSTGRES_PASSWORD: tietide_secret
          POSTGRES_DB: tietide
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tietide"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tietide/api db:generate

      - name: Build packages
        run: pnpm run build

      - name: Run tests with coverage
        run: pnpm -r --if-present run test:coverage
        env:
          DATABASE_URL: postgresql://tietide:tietide_secret@localhost:5432/tietide?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          CI: true

      - name: Validate pipeline contract
        run: node infra/ci/validate-pipeline.mjs

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            apps/api/coverage/
            apps/worker/coverage/
            apps/spa/coverage/
          retention-days: 14

  test-ai:
    name: Test (AI service)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/ai/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    strategy:
      fail-fast: false
      matrix:
        app: [api, worker, spa, ai]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: false
          load: false
          tags: tietide-${{ matrix.app }}:ci
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max
