name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tietide
          POSTGRES_PASSWORD: tietide_secret
          POSTGRES_DB: tietide
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tietide"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tietide/api db:generate

      - name: Build packages
        run: pnpm run build

      - name: Run tests
        run: pnpm run test
        env:
          DATABASE_URL: postgresql://tietide:tietide_secret@localhost:5432/tietide?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Typecheck
        run: pnpm run typecheck
